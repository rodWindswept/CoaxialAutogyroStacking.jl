# JuliaFormatter config — keeps multi-author/agent commits free of
# whitespace churn. Run `using JuliaFormatter; format(".")` before committing,
# or let the format-check CI flag drift.
style = "blue"
indent = 4
margin = 92
always_for_in = true
whitespace_typedefs = true
whitespace_ops_in_indices = true
remove_extra_newlines = true
trailing_comma = true
normalize_line_endings = "unix"
